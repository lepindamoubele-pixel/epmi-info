<!DOCTYPE html>
<html lang="fr">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Événements | ECAM-EPMI</title>
      <link rel="stylesheet" href="../css/css5.css">
   </head>
   <body class="events-page">
      <header class="topbar">
         <a href="../index.html" class="logo">ECAM-EPMI</a>
         <nav class="navbar">
            <ul class="nav-links">
               <li><a href="../index.html">Accueil</a></li>
               <li><a href="assopage.html">Associations</a></li>
               <li class="dropdown">
                  <a href="#">Rubriques ▾</a>
                  <ul class="dropdown-menu">
                     <li><a href="#">Événements</a></li>
                     <li><a href="bde.html">BDE</a></li>
                     <li><a href="contact.html">Contact</a></li>
                  </ul>
               </li>
               <li><a href="contact.html">Contact</a></li>
            </ul>
         </nav>
      </header>
      <main>
         <section class="event-form-section">
            <h2>Proposer un événement</h2>
            <form action="https://formspree.io/f/mdawqbek" method="POST">
               <input type="hidden" name="_subject" value="Nouvelle proposition d'événement">
               <table class="form-table">
                  <tr>
                     <td><label for="nom">Nom :</label></td>
                     <td><input type="text" id="nom" name="nom" required></td>
                  </tr>
                  <tr>
                     <td><label for="email">Email :</label></td>
                     <td><input type="email" id="email" name="email" required></td>
                  </tr>
                  <tr>
                     <td><label for="association">Association :</label></td>
                     <td>
                        <select id="association" name="association">
                           <option>EPMI INFO</option>
                           <option>MOVE IT</option>
                           <option>EPMI'S COM</option>
                           <option>ECAM-EPMI INTERNATIONAL</option>
                           <option>AMEE</option>
                           <option>EPMI GAMING</option>
                           <option>ERI</option>
                           <option>SOT</option>
                           <option>ELAN</option>
                           <option>Zup de Co</option>
                           <option>Expli'Cité</option>
                           <option>BDE</option>
                           <option>BDS</option>
                        </select>
                     </td>
                  </tr>
                  <tr>
                     <td><label for="event">Nom de l'événement :</label></td>
                     <td><input type="text" id="event" name="event" required></td>
                  </tr>
                  <tr>
                     <td><label for="date">Date :</label></td>
                     <td><input type="date" id="date" name="date" required></td>
                  </tr>
                  <tr>
                     <td><label for="description">Description :</label></td>
                     <td><textarea id="description" name="message" rows="5" required></textarea></td>
                  </tr>
                  <tr>
                     <td colspan="2" class="submit-row">
                        <button type="submit">Envoyer</button>
                     </td>
                  </tr>
               </table>
            </form>
         </section>
      </main>
      <footer class="site-footer">
         <p>© 2026 ECAM-EPMI - Projet web étudiant</p>

            <a href="../index.html">Accueil</a>
            <a href="assopage.html">Associations</a>
            <a href="#">Événements</a>
            <a href="contact.html">Contact</a>
         </div>
      </footer>
   </body>
</html>
